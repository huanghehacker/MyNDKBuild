name: Build LLVM (Clang+LLD, Pass Ready Fix) - Termux

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: "Android NDK Version"
        default: 'r27c'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build Clang/LLD
    runs-on: ubuntu-24.04
    
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo docker system prune -a -f
          sudo apt-get clean

      - name: Setup Swap (16GB)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: 2d287f51eff2a5fbf84458a33f7fb2493cf67965
          path: llvm-project
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake build-essential xz-utils lld ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: llvm-clang-lld-export-dyn-${{ inputs.ndk_version }}-${{ github.sha }}
          max-size: 4G

      - name: Setup NDK
        run: |
          curl -sSfL -o android-ndk.zip "https://dl.google.com/android/repository/android-ndk-${{ inputs.ndk_version }}-linux.zip"
          unzip -qq android-ndk.zip
          NDK_ROOT=$(pwd)/android-ndk-${{ inputs.ndk_version }}
          echo "NDK_ROOT=$NDK_ROOT" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          mkdir -p build
          
          # ==== 终极插件加载修复版 ====
          # 核心修复: -DCMAKE_EXE_LINKER_FLAGS="-Wl,-export-dynamic"
          # 强制将可执行文件(clang++)的所有符号导出到动态符号表，供 .so 插件 dlopen 时调用
          
          cmake -G Ninja -S llvm-project/llvm -B build \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DANDROID_STL=c++_static \
            \
            -DCMAKE_C_FLAGS="-g0" \
            -DCMAKE_CXX_FLAGS="-g0" \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,-export-dynamic" \
            -DCMAKE_MODULE_LINKER_FLAGS="-Wl,--unresolved-symbols=ignore-all" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--unresolved-symbols=ignore-all" \
            \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DLLVM_APPEND_VC_REV=ON \
            -DLLVM_TARGETS_TO_BUILD="AArch64" \
            -DLLVM_ENABLE_PROJECTS="clang;clang-tools-extra;lld" \
            -DLLVM_INSTALL_UTILS=ON \
            \
            -DLLVM_ENABLE_RTTI=ON \
            -DLLVM_ENABLE_LEGACY_PASS_MANAGER=ON \
            \
            -DLLVM_ENABLE_BACKTRACES=OFF \
            -DLLVM_BUILD_DOCS=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_BUILD_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            \
            -DLLVM_PARALLEL_LINK_JOBS=1 \
            -DLLVM_STATIC_LINK_CXX_STDLIB=ON \
            -DLLVM_ENABLE_PLUGINS=ON \
            -DLLVM_EXPORT_SYMBOLS_FOR_PLUGINS=ON \
            \
            -DLLVM_BUILD_LLVM_DYLIB=OFF \
            -DLLVM_LINK_LLVM_DYLIB=OFF \
            -DLLVM_ENABLE_SHARED_LIBS=OFF \
            -DCLANG_ENABLE_SHARED=OFF \
            \
            -DCMAKE_INSTALL_DO_STRIP=OFF \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/install_output

      - name: Build & Install
        run: |
          cmake --build build --target install -j4

      - name: Cleanup Artifacts
        run: |
          cd install_output
          find lib -name "*.a" -type f -delete 
          echo "Build finished. Final size:"
          du -sh .

      - name: Compress and Split
        run: |
          tar -cf - -C install_output . | xz -9e -T0 | split -b 400M - "llvm-clang-lld.tar.xz."
          ls -lh llvm-clang-lld.tar.xz.*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: llvm-clang-lld-dyn-${{ github.run_number }}
          name: LLVM Clang+LLD Build ${{ github.run_number }} (Export Dynamic)
          body: |
            Streamlined, stable build of LLVM for Termux. 
            Fixed `dlopen` symbol resolution for Pass plugins by forcing `-Wl,-export-dynamic`.
            
            **Configuration:**
            - Build Type: `Release` (-g0)
            - Projects: `clang`, `clang-tools-extra`, `lld`
            - Features: `LLVM_ENABLE_RTTI=ON`, `LLVM_INSTALL_UTILS=ON`
            - Linker: `-export-dynamic` applied to executables.
            
            **How to use:**
            Download all parts and run:
            `cat llvm-clang-lld.tar.xz.* | tar -xJ`
          files: |
            llvm-clang-lld.tar.xz.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
