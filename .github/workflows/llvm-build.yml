name: Build LLVM (Full-Featured, Static) - Termux

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: "Android NDK Version"
        default: 'r27c'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build Clang/LLD (Full-Featured)
    runs-on: ubuntu-24.04
    
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Setup Swap (16GB)
        run: |
          # 编译 MLIR 和 Polly 非常消耗内存，Swap 是必须的
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      # 检出指定的 commit
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: 2d287f51eff2a5fbf84458a33f7fb2493cf67965
          path: llvm-project
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake build-essential xz-utils lld ccache

      # ccache 在这种大型构建中尤为重要，可以大幅加速失败后的重试
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: llvm-full-featured-${{ inputs.ndk_version }}-${{ github.sha }}
          max-size: 4G # 增加缓存大小以容纳更多项目

      - name: Setup NDK
        run: |
          curl -sSfL -o android-ndk.zip "https://dl.google.com/android/repository/android-ndk-${{ inputs.ndk_version }}-linux.zip"
          unzip -qq android-ndk.zip
          NDK_ROOT=$(pwd)/android-ndk-${{ inputs.ndk_version }}
          echo "NDK_ROOT=$NDK_ROOT" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          mkdir -p build
          
          # ==== 采用你指定的稳定、功能完整的配置 ====
          # - 目标: 仅构建 Android AArch64
          # - 行为: 纯静态链接，但导出符号以加载 Pass
          
          cmake -G Ninja -S llvm-project/llvm -B build \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DANDROID_STL=c++_static \
            \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DLLVM_APPEND_VC_REV=ON \
            -DLLVM_TARGETS_TO_BUILD="AArch64" \
            -DLLVM_ENABLE_PROJECTS="clang;clang-tools-extra;compiler-rt;lld;mlir;polly" \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi;libunwind" \
            -DLLVM_INSTALL_UTILS=ON \
            \
            -DLLVM_ENABLE_BACKTRACES=OFF \
            -DLLVM_BUILD_DOCS=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_BUILD_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            \
            -DLLVM_PARALLEL_LINK_JOBS=1 \
            -DLLVM_STATIC_LINK_CXX_STDLIB=ON \
            -DLLVM_ENABLE_PLUGINS=ON \
            -DLLVM_EXPORT_SYMBOLS_FOR_PLUGINS=ON \
            \
            -DLLVM_BUILD_LLVM_DYLIB=OFF \
            -DLLVM_LINK_LLVM_DYLIB=OFF \
            -DLLVM_ENABLE_SHARED_LIBS=OFF \
            -DCLANG_ENABLE_SHARED=OFF \
            \
            -DCMAKE_INSTALL_DO_STRIP=OFF \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/install_output

      - name: Build & Install
        run: |
          # 这是一个非常庞大的构建任务，请耐心等待
          cmake --build build --target install

      - name: Cleanup Artifacts
        run: |
          cd install_output
          # 删除静态库以减小最终包体积
          find lib -name "*.a" -type f -delete 
          echo "Build finished. Final size:"
          du -sh .

      - name: Compress and Split
        run: |
          tar -cf - -C install_output . | xz -9e -T0 | split -b 400M - "llvm-full-featured.tar.xz."
          ls -lh llvm-full-featured.tar.xz.*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: llvm-full-${{ github.run_number }}
          name: LLVM Full-Featured Build ${{ github.run_number }} (Pass Ready)
          body: |
            A full-featured, stable build of LLVM for Termux, based on your provided configuration.
            
            **Configuration:**
            - Source: `llvm/llvm-project` @ `2d287f51`
            - Build Type: `Release`
            - Projects: `clang`, `clang-tools-extra`, `compiler-rt`, `lld`, `mlir`, `polly`
            - Runtimes: `libcxx`, `libcxxabi`, `libunwind`
            - Linking: Pure static executable with exported symbols for Pass loading.
            
            **How to use:**
            Download all parts and run:
            `cat llvm-full-featured.tar.xz.* | tar -xJ`
          files: |
            llvm-full-featured.tar.xz.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
