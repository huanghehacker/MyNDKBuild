name: Make NDK (Bionic libc) for aarch64
run-name: Make NDK-r${{inputs.version}}${{inputs.revision}} bionic for aarch64 (Fixed & Split)
on:
  workflow_dispatch:
    inputs:
      version:
        description: "NDK Release version:"
        default: '30'
        required: true
        type: string
      revision:
        description: "NDK Release revision:"
        default: '-beta1'
        required: false
        type: string

jobs:
  make:
    name: Make NDK Bionic for aarch64
    runs-on: ubuntu-24.04
    env:
      TARGET: aarch64-linux-android
      ANDROID_PLATFORM: 25

    steps:
      - name: Checkout android-ndk-custom
        uses: actions/checkout@v5
        with:
          path: ${{ github.workspace }}

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/workdir
          key: ${{ runner.os }}-${{ env.TARGET }}-symbols-${{ hashFiles('.github/workflows/*.yml') }}

      - name: Get Official NDK and Clean Up
        run: |
          echo "Downloading NDK r${{inputs.version}}${{inputs.revision}}..."
          curl -sSfL -o android-ndk.zip "https://dl.google.com/android/repository/android-ndk-r${{inputs.version}}${{inputs.revision}}-linux.zip"
          unzip -qq android-ndk.zip -d "$RUNNER_TEMP"
          rm -f android-ndk.zip

      - name: Install System Dependencies
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt update
          sudo apt install -y ninja-build python3.11 jq curl build-essential
          sudo apt-get clean

      - name: Build Extra Dependencies
        run: |
          WORK_DIR="$RUNNER_TEMP/workdir"
          ROOTDIR="$GITHUB_WORKSPACE"
          
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"

          HAVE_PSELECT=yes
          NDK_DIR="$RUNNER_TEMP/android-ndk-r${{inputs.version}}${{inputs.revision}}"
          TOOLCHAIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64"
          SHADER_TOOLS_BIN="$NDK_DIR/shader-tools/linux-x86_64"
          PREBUILT_BIN="$NDK_DIR/prebuilt/linux-x86_64/bin"
          MAKE_VERSION=4.4
          YASM_VERSION=$("$PREBUILT_BIN/yasm" --version | sed -n '1s/.*yasm \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
          
          # 定义全局交叉编译工具链
          export CC="${TOOLCHAIN}/bin/${{env.TARGET}}${ANDROID_PLATFORM}-clang"
          export CXX="${TOOLCHAIN}/bin/${{env.TARGET}}${ANDROID_PLATFORM}-clang++"
          export AR="${TOOLCHAIN}/bin/llvm-ar"
          export RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
          export READELF="${TOOLCHAIN}/bin/llvm-readelf"
          export STRIP="${TOOLCHAIN}/bin/llvm-strip"
          export LD="${TOOLCHAIN}/bin/ld"
          export OBJCOPY="${TOOLCHAIN}/bin/llvm-objcopy"

          if [ "${{inputs.version}}" -ge 30 ]; then
            GLSLC_VERSION_OUTPUT="$($SHADER_TOOLS_BIN/glslc --version)"
            SHADERC_HASH=$(echo "$GLSLC_VERSION_OUTPUT" | sed -n 's/^shaderc .* \([a-f0-9]\{40\}\)$/\1/p')
            SPIRV_TOOLS_HASH=$(echo "$GLSLC_VERSION_OUTPUT" | sed -n 's/^spirv-tools .* \([a-f0-9]\{40\}\)$/\1/p')
            GLSLANG_HASH=$(echo "$GLSLC_VERSION_OUTPUT" | sed -n 's/^glslang \([0-9a-f]\{40\}\)$/\1/p')
            SPIRV_HEADERS_HASH=$(curl -LkSs "https://android.googlesource.com/platform/external/shaderc/spirv-tools/+/${SPIRV_TOOLS_HASH}/DEPS?format=TEXT" | base64 -d | grep -oP "'spirv_headers_revision': '\K[a-f0-9]{40}")
          else
            NDK_TAG=$($SHADER_TOOLS_BIN/glslc --version | sed -n 's/.*\(ndk-[^ ]*\).*/\1/p' | sed 's/+/%2B/g' | head -n 1)
            SHADERC_HASH=$(curl -LkSs "https://android.googlesource.com/platform/external/shaderc/shaderc/+/refs/tags/${NDK_TAG}" | grep -oP 'href="/platform/external/shaderc/shaderc/\+archive/[a-f0-9]{40}\.tar\.gz"' | sed -E 's/^href="\/platform\/external\/shaderc\/shaderc\/\+archive\///' | sed 's/\.tar\.gz"$//')
            SPIRV_TOOLS_HASH=$(curl -LkSs "https://android.googlesource.com/platform/external/shaderc/spirv-tools/+/refs/tags/${NDK_TAG}" | grep -oP 'href="/platform/external/shaderc/spirv-tools/\+archive/[a-f0-9]{40}\.tar\.gz"' | sed -E 's/^href="\/platform\/external\/shaderc\/spirv-tools\/\+archive\///' | sed 's/\.tar\.gz"$//')
            SPIRV_HEADERS_HASH=$(curl -LkSs "https://android.googlesource.com/platform/external/shaderc/spirv-headers/+/refs/tags/${NDK_TAG}" | grep -oP 'href="/platform/external/shaderc/spirv-headers/\+archive/[a-f0-9]{40}\.tar\.gz"' | sed -E 's/^href="\/platform\/external\/shaderc\/spirv-headers\/\+archive\///' | sed 's/\.tar\.gz"$//')
            GLSLANG_HASH=$(curl -LkSs "https://android.googlesource.com/platform/external/shaderc/glslang/+/refs/tags/${NDK_TAG}" | grep -oP 'href="/platform/external/shaderc/glslang/\+archive/[a-f0-9]{40}\.tar\.gz"' | sed -E 's/^href="\/platform\/external\/shaderc\/glslang\/\+archive\///' | sed 's/\.tar\.gz"$//')
          fi

          # GNU Make
          if [ ! -d "make" ]; then
            if [ -f "$ROOTDIR/sources/make-$MAKE_VERSION.tar.gz" ]; then
              tar -xzf "$ROOTDIR/sources/make-$MAKE_VERSION.tar.gz"
            else
              curl -LkSs "https://ftp.gnu.org/gnu/make/make-$MAKE_VERSION.tar.gz" | tar -xz
            fi
            mv make-$MAKE_VERSION make
            cd make
            
            mkdir -p build-aux
            if [ -f "$ROOTDIR/config/config.sub" ]; then
              cp "$ROOTDIR/config/config.sub" build-aux/
              cp "$ROOTDIR/config/config.guess" build-aux/
            else
              curl -sLo build-aux/config.sub "https://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.sub;hb=HEAD"
              curl -sLo build-aux/config.guess "https://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.guess;hb=HEAD"
              chmod +x build-aux/config.*
            fi

            ./configure --prefix="${PWD}/build" --build=x86_64-linux-gnu --host=${{ env.TARGET }} --disable-posix-spawn \
              CC="$CC" CXX="$CXX" AR="$AR" RANLIB="$RANLIB" STRIP="$STRIP" LD="$LD" OBJCOPY="$OBJCOPY" \
              CFLAGS="-Wno-error=implicit-function-declaration -static" LDFLAGS="-static" \
              ac_cv_lib_elf_elf_begin=no am_cv_func_iconv=no ac_cv_func_pselect=$HAVE_PSELECT
            make -j"$(nproc --all)" install
            cd ..
          fi
          
          # YASM
          if [ ! -d "yasm" ]; then
            if [ -f "$ROOTDIR/sources/yasm-$YASM_VERSION.tar.gz" ]; then
              tar -xzf "$ROOTDIR/sources/yasm-$YASM_VERSION.tar.gz"
            else
              curl -LkSs "https://www.tortall.net/projects/yasm/releases/yasm-$YASM_VERSION.tar.gz" | tar -xz
            fi
            mv yasm-$YASM_VERSION yasm
            cd yasm
            
            mkdir -p config
            if [ -f "$ROOTDIR/config/config.sub" ]; then
              cp "$ROOTDIR/config/config.sub" config/
              cp "$ROOTDIR/config/config.guess" config/
            else
              curl -sLo config/config.sub "https://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.sub;hb=HEAD"
              curl -sLo config/config.guess "https://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.guess;hb=HEAD"
              chmod +x config/config.*
            fi

            ./configure --prefix="${PWD}/build" --build=x86_64-linux-gnu --host=${{ env.TARGET }} --disable-nls \
              CC="$CC" CXX="$CXX" AR="$AR" RANLIB="$RANLIB" STRIP="$STRIP" LD="$LD" OBJCOPY="$OBJCOPY" \
              CFLAGS="-static"
            make -j"$(nproc --all)" install
            cd ..
          fi

          # SPIRV-Tools and shaderc
          if [ ! -d "shaderc" ]; then
            mkdir -p shaderc && cd shaderc
            curl -LkSs "https://android.googlesource.com/platform/external/shaderc/shaderc/+archive/$SHADERC_HASH.tar.gz" | tar -xz
            mkdir -p third_party/spirv-tools/external/spirv-headers && curl -LkSs "https://android.googlesource.com/platform/external/shaderc/spirv-tools/+archive/$SPIRV_TOOLS_HASH.tar.gz" | tar -xz -C third_party/spirv-tools
            curl -LkSs "https://android.googlesource.com/platform/external/shaderc/spirv-headers/+archive/$SPIRV_HEADERS_HASH.tar.gz" | tar -xz -C third_party/spirv-tools/external/spirv-headers
            mkdir -p third_party/glslang && curl -LkSs "https://android.googlesource.com/platform/external/shaderc/glslang/+archive/$GLSLANG_HASH.tar.gz" | tar -xz -C third_party/glslang
            
            sed -i '/^elseif(UNIX)$/,/^[[:space:]]*endif()$/d' third_party/glslang/StandAlone/CMakeLists.txt
            
            if [ -f "$ROOTDIR/patches/ndk/spirv/full_static.patch" ]; then
              (cd third_party/spirv-tools && git init --quiet && git apply "$ROOTDIR/patches/ndk/spirv/full_static.patch" && rm -rf .git)
            fi
            if [ -f "$ROOTDIR/patches/ndk/shaderc/full_static.patch" ]; then
              git init --quiet && git apply "$ROOTDIR/patches/ndk/shaderc/full_static.patch" && rm -rf .git
            fi

            cmake -S . -B build -G Ninja -DCMAKE_INSTALL_PREFIX="$PWD/install" \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DCMAKE_C_FLAGS="-static" -DCMAKE_CXX_FLAGS="-static" -DCMAKE_EXE_LINKER_FLAGS="-static" \
              -DCMAKE_CROSSCOMPILING=True -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_C_COMPILER="$CC" \
              -DCMAKE_CXX_COMPILER="$CXX" \
              -DCMAKE_AR="$AR" \
              -DCMAKE_RANLIB="$RANLIB" \
              -DSHADERC_SKIP_TESTS=ON -DSHADERC_SKIP_EXAMPLES=ON
            cmake --build build --target install
            cd ..
          fi

          # Python
          if [ ! -d "python" ]; then
            curl -LkSs https://www.python.org/ftp/python/3.11.4/Python-3.11.4.tar.xz | xz -d | tar -x
            mv Python-3.11.4 python && cd python
            
            if [ -f "$ROOTDIR/config/config.sub" ]; then
              cp "$ROOTDIR/config/config.sub" . && cp "$ROOTDIR/config/config.guess" .
            else
              curl -sLo config.sub "https://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.sub;hb=HEAD"
              curl -sLo config.guess "https://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.guess;hb=HEAD"
              chmod +x config.*
            fi

            echo -e "ac_cv_file__dev_ptmx=no\nac_cv_file__dev_ptc=no" > config.site
            sed -i $'/^case \\$host_cpu in #(/,/^esac$/c\\\nMODULE_BUILDTYPE=static' configure

            # 补齐所有 Python 交叉编译需要的二进制工具环境变量
            ./configure --prefix="${PWD}/build" --build=x86_64-linux-gnu --host=${{ env.TARGET }} --disable-shared --disable-ipv6 \
              --with-build-python --without-ensurepip CONFIG_SITE=config.site \
              CC="$CC" CXX="$CXX" AR="$AR" RANLIB="$RANLIB" READELF="$READELF" STRIP="$STRIP" LD="$LD" OBJCOPY="$OBJCOPY" \
              LDSHARED="$CC -shared -fPIC" _PYTHON_HOST_PLATFORM="${{ env.TARGET }}"
            make -j"$(nproc --all)" build_all || echo "WARNING: issue in building python"
            make install
            cd ..
          fi

      - name: Get LLVM and Clean Up
        run: |
          LLVM_ARCHIVE="bolt+clang+clang-tools-extra+lld-r${{inputs.version}}${{inputs.revision}}-${{env.TARGET}}.tar.xz"
          curl -LkSs "https://github.com/${{ github.repository_owner }}/llvm-custom/releases/download/llvm-r${{inputs.version}}/${LLVM_ARCHIVE}" -o "${LLVM_ARCHIVE}"
          
          if [ ! -s "${LLVM_ARCHIVE}" ]; then
            echo "Error: LLVM Archive download failed."
            exit 1
          fi
          
          tar -xJf "${LLVM_ARCHIVE}"
          rm -f "${LLVM_ARCHIVE}"

      - name: Make NDK Bionic
        run: |
          WORK_DIR="$RUNNER_TEMP/workdir"
          NDK="$RUNNER_TEMP/android-ndk-r${{inputs.version}}${{inputs.revision}}"
          HOST_TOOLCHAIN="${PWD}/bolt+clang+clang-tools-extra+lld-r${{inputs.version}}${{inputs.revision}}-${{env.TARGET}}"
          NDK_TOOLCHAIN_SYMLINK="${NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          CC="${NDK_TOOLCHAIN_SYMLINK}/bin/${{env.TARGET}}${ANDROID_PLATFORM}-clang"

          if [ -f "$GITHUB_WORKSPACE/sources/portable_cmp.c" ]; then
            $CC $CFLAGS "$GITHUB_WORKSPACE/sources/portable_cmp.c" -o ${NDK}/prebuilt/linux-x86_64/bin/cmp
            $CC $CFLAGS "$GITHUB_WORKSPACE/sources/portable_echo.c" -o ${NDK}/prebuilt/linux-x86_64/bin/echo
          fi

          find "${NDK_TOOLCHAIN_SYMLINK}/bin" -type f | while IFS= read -r file; do
              bname="$(basename "${file}")"
              if [ -f "${HOST_TOOLCHAIN}/bin/${bname}" ] && file "${file}" | grep -q 'ELF'; then
                  cp "${HOST_TOOLCHAIN}/bin/${bname}" "${file}"
              elif file "${file}" | grep -q 'Bourne-Again shell script'; then
                  sed -i 's,#!/usr/bin/env bash,#!/usr/bin/env sh,' "${file}"
              elif ! file "${file}" | grep -Eq 'Python script|Perl script|ASCII text'; then
                  rm -f "${file}"
              fi
          done
          
          sed -i 's,#!/usr/bin/env bash,#!/usr/bin/env sh,' "${NDK}/build/tools/ndk_bin_common.sh" "${NDK}/build/tools/make_standalone_toolchain.py" "${NDK}/build/ndk-build"
          sed -i 's,#!/bin/bash,#!/bin/sh,' "${NDK}/prebuilt/linux-x86_64/bin/ndk-gdb" "${NDK}/prebuilt/linux-x86_64/bin/ndk-stack" "${NDK}/prebuilt/linux-x86_64/bin/ndk-which" "${NDK}/simpleperf/inferno.sh" "${NDK_TOOLCHAIN_SYMLINK}/bin/lldb.sh"
          
          if [ -f "$GITHUB_WORKSPACE/patches/ndk/scripts/clang-tidy.sh" ]; then
            cp "$GITHUB_WORKSPACE/patches/ndk/scripts/clang-tidy.sh" "${NDK_TOOLCHAIN_SYMLINK}/bin"
            cp "$GITHUB_WORKSPACE/patches/ndk/scripts/ndk-which" "${NDK}/prebuilt/linux-x86_64/bin"
          fi
          
          rm -rf "${NDK_TOOLCHAIN_SYMLINK}/python3" "${NDK}/prebuilt/linux_x86-64/bin/*asm"
          cp -R "${HOST_TOOLCHAIN}/lib/clang" "${NDK_TOOLCHAIN_SYMLINK}/lib"
          cp "${WORK_DIR}/make/build/bin/make" "${NDK}/prebuilt/linux-x86_64/bin"
          cp "${WORK_DIR}/yasm/build/bin/yasm" "${NDK}/prebuilt/linux-x86_64/bin"
          cp "${WORK_DIR}/yasm/build/bin/yasm" "${NDK_TOOLCHAIN_SYMLINK}/bin"
          
          mkdir -p "${NDK_TOOLCHAIN_SYMLINK}/python3/bin" "${NDK_TOOLCHAIN_SYMLINK}/python3/lib"
          cp "${WORK_DIR}/python/python" "${NDK_TOOLCHAIN_SYMLINK}/python3/bin/python3"
          cp -R "${WORK_DIR}/python/build/lib/python3.11" "${NDK_TOOLCHAIN_SYMLINK}/python3/lib"
          
          find "${NDK}/shader-tools/linux-x86_64" -type f | while IFS= read -r file; do
             bname="$(basename "${file}")"
             if [ -f "${WORK_DIR}/shaderc/install/bin/${bname}" ]; then
               cp "${WORK_DIR}/shaderc/install/bin/${bname}" "${file}"
             fi
          done
          rm -f "${NDK}/shader-tools/linux-x86_64/libc++.so"
          
          ARCH="arm64"
          mv "${NDK}/prebuilt/linux-x86_64" "${NDK}/prebuilt/linux-${ARCH}"
          mv "${NDK}/toolchains/llvm/prebuilt/linux-x86_64" "${NDK}/toolchains/llvm/prebuilt/linux-${ARCH}"
          mv "${NDK}/shader-tools/linux-x86_64" "${NDK}/shader-tools/linux-${ARCH}"
          ln -s "linux-${ARCH}" "${NDK}/prebuilt/linux-x86_64"
          ln -s "linux-${ARCH}" "${NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          ln -s "linux-${ARCH}" "${NDK}/shader-tools/linux-x86_64"
          
          for file in ${NDK}/ndk-gdb ${NDK}/ndk-lldb ${NDK}/ndk-stack ${NDK}/ndk-which; do sed -i "s|linux-x86_64|linux-${ARCH}|g" "$file"; done
          sed -i -E '/^if\(CMAKE_HOST_SYSTEM_NAME STREQUAL Linux\)$/,/^endif\(\)$/c\if(CMAKE_HOST_SYSTEM_NAME STREQUAL Linux OR CMAKE_HOST_SYSTEM_NAME STREQUAL Android)\n    execute_process(COMMAND uname -m OUTPUT_VARIABLE HOST_ARCH OUTPUT_STRIP_TRAILING_WHITESPACE)\n    if(HOST_ARCH STREQUAL "aarch64")\n        set(ARCH "arm64")\n    else()\n        set(ARCH "x86_64")\n    endif()\n    set(ANDROID_HOST_TAG "linux-${ARCH}")\nelseif(CMAKE_HOST_SYSTEM_NAME STREQUAL Darwin)\n    set(ANDROID_HOST_TAG "darwin-x86_64")\nelseif(CMAKE_HOST_SYSTEM_NAME STREQUAL Windows)\n    set(ANDROID_HOST_TAG "windows-x86_64")\nendif()' "${NDK}/build/cmake/android.toolchain.cmake"
          
          if [ -f "$GITHUB_WORKSPACE/sources/package-generator.c" ]; then
            (cd $NDK && /usr/bin/cc $GITHUB_WORKSPACE/sources/package-generator.c -o $HOME/package-generator && $HOME/package-generator package.xml $(grep '^Pkg\.Revision =' source.properties | cut -d'=' -f2 | tr -d ' '))
          fi

      - name: Create LLVM Version JSON
        id: create_json
        run: |
          NDK_DIR="$RUNNER_TEMP/android-ndk-r${{inputs.version}}${{inputs.revision}}"
          NDK_VERSION="r${{inputs.version}}${{inputs.revision}}"
          LLVM_VERSION_STRING=$("$NDK_DIR/toolchains/llvm/prebuilt/linux-arm64/bin/clang" --version | head -n 1)
          
          jq -n --arg ndk_version "$NDK_VERSION" --arg llvm_version "$LLVM_VERSION_STRING" \
            '{ndk_version: $ndk_version, llvm_version: $llvm_version}' > "$NDK_DIR/llvm_version.json"

      - name: Free Up Disk Space Before Archiving
        run: |
          WORK_DIR="$RUNNER_TEMP/workdir"
          rm -rf "$WORK_DIR"
          rm -rf "${PWD}/bolt+clang+clang-tools-extra+lld-r${{inputs.version}}${{inputs.revision}}-${{env.TARGET}}"

      - name: Archive NDK into Split Files
        run: |
          ARCHIVE_PREFIX="android-ndk-r${{inputs.version}}${{inputs.revision}}-${{env.TARGET}}.tar.xz"
          cd "$RUNNER_TEMP"
          echo "Archiving and splitting into 200MB chunks..."
          
          tar -cf - "android-ndk-r${{inputs.version}}${{inputs.revision}}" | \
          xz -T0 -9e --lzma2=dict=256MiB | \
          split -b 200M -d -a 3 - "$GITHUB_WORKSPACE/${ARCHIVE_PREFIX}."

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          name: "r${{inputs.version}}${{inputs.revision}}"
          tag: "r${{inputs.version}}"
          artifacts: "android-ndk-r${{inputs.version}}${{inputs.revision}}-${{env.TARGET}}.tar.xz.*"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
